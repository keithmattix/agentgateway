apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-backendauth-credentials
  namespace: agentgateway-base
spec:
  parentRefs:
    - name: gateway
  hostnames:
    - "credentials-auth.example.com"
  rules:
    - backendRefs:
        - name: backend
          port: 80
---
apiVersion: v1
kind: Secret
metadata:
  name: credentials-secret
  namespace: agentgateway-base
type: Opaque
data:
  # base64("primary-api-key")
  DD-API-KEY: cHJpbWFyeS1hcGkta2V5
  # base64("application-key")
  app-key: YXBwbGljYXRpb24ta2V5
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: backendauth-credentials
  namespace: agentgateway-base
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: route-backendauth-credentials
  backend:
    auth:
      credentials:
        - location:
            header:
              name: DD-API-KEY
          secretRef:
            name: credentials-secret
            key: DD-API-KEY
        - location:
            header:
              name: DD-APPLICATION-KEY
          secretRef:
            name: credentials-secret
            key: app-key
