_err: policies cannot be used with virtualModel
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayModel
metadata:
  name: virtual-model-with-policies
spec:
  parentRefs:
  - name: ai-gateway
    sectionName: llm
  policies:
    transformations:
    - field: model
      expression: '"replacement"'
    authorization:
      policy:
        matchExpressions:
        - 'true'
  virtualModel:
    weighted:
      targets:
      - modelRef:
          name: concrete-model
