apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: basic-auth
  namespace: default
spec:
  parentRefs:
  - name: test-gateway
  rules:
  - backendRefs:
    - name: test-service
      port: 80
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: basic-auth
  namespace: default
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: basic-auth
  traffic:
    basicAuthentication:
      secretRef:
        name: basic-auth
        key: users
---
apiVersion: v1
kind: Secret
metadata:
  name: basic-auth
  namespace: default
stringData:
  users: alice:hash

---
# Output
output:
- gateway:
    Name: test-gateway
    Namespace: default
  resource:
    policy:
      key: traffic/default/basic-auth:basicauth:default/basic-auth
      name:
        kind: AgentgatewayPolicy
        name: basic-auth
        namespace: default
      target:
        route:
          kind: HTTPRoute
          name: basic-auth
          namespace: default
      traffic:
        basicAuth: {}
- gateway:
    Name: test-gateway
    Namespace: default
  resource:
    route:
      backends:
      - backend:
          port: 80
          service:
            hostname: test-service.default.svc.cluster.local
            namespace: default
        weight: 1
      key: default/basic-auth.00.http
      listenerKey: default/test-gateway.http
      name:
        kind: HTTPRoute
        name: basic-auth
        namespace: default
status:
