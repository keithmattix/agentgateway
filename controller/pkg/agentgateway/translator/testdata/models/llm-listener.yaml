    health:
      unhealthyCondition: response.code >= 500
    tls:
      insecureSkipVerify: All
    tunnel:
      backendRef:
        name: egress-proxy
        port: 8080
    headers:
      request:
        add:
        - name: x-model-request-policy
          value: enabled
      response:
        add:
        - name: x-model-response-policy
          value: enabled
    promptGuard:
      request:
      - regex:
          matches:
          - blocked
          action: Reject
