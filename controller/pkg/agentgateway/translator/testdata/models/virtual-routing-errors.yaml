apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: virtual-model-errors
  namespace: default
spec:
  gatewayClassName: agentgateway
  listeners:
  - name: llm
    port: 80
    protocol: HTTP
    allowedRoutes:
      kinds:
      - group: agentgateway.dev
        kind: AgentgatewayModel
      namespaces:
        from: Same
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayModel
metadata:
  name: wildcard-model
  namespace: default
spec:
  parentRefs:
  - name: virtual-model-errors
    sectionName: llm
  match:
    model: gpt-*
  visibility: Internal
  provider: OpenAI
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayModel
metadata:
  name: missing-model-target
  namespace: default
spec:
  parentRefs:
  - name: virtual-model-errors
    sectionName: llm
  virtualModel:
    weighted:
      targets:
      - modelRef:
          name: does-not-exist
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayModel
metadata:
  name: wildcard-model-target-without-model
  namespace: default
spec:
  parentRefs:
  - name: virtual-model-errors
    sectionName: llm
  virtualModel:
    weighted:
      targets:
      - modelRef:
          name: wildcard-model

---
# Output
output:
- gateway:
    Name: virtual-model-errors
    Namespace: default
  resource:
    backend:
      ai:
        providerGroups:
        - providers:
          - name: backend
            openai: {}
      key: default/wildcard-model/backend.llm
      name:
        name: wildcard-model
        namespace: default
- gateway:
    Name: virtual-model-errors
    Namespace: default
  resource:
    bind:
      key: 80/default/virtual-model-errors
      port: 80
- gateway:
    Name: virtual-model-errors
    Namespace: default
  resource:
    listener:
      bindKey: 80/default/virtual-model-errors
      key: default/virtual-model-errors.llm
      name:
        gatewayName: virtual-model-errors
        gatewayNamespace: default
        listenerName: llm
      protocol: HTTP
- gateway:
    Name: virtual-model-errors
    Namespace: default
  resource:
    modelRoute:
      concreteModel:
        backend:
          backend: default/wildcard-model/backend.llm
        modelVisibility: INTERNAL
      key: default/wildcard-model.llm
      listenerKey: default/virtual-model-errors.llm
      match:
        model: gpt-*
status:
- apiVersion: agentgateway.dev/v1alpha1
  kind: AgentgatewayModel
  metadata:
    name: missing-model-target
    namespace: default
  spec: null
  status:
    parents:
    - conditions:
      - lastTransitionTime: fake
        message: Successfully accepted AgentgatewayModel
        reason: Accepted
        status: "True"
        type: Accepted
      - lastTransitionTime: fake
        message: model target default/does-not-exist not found
        reason: Invalid
        status: "False"
        type: ResolvedRefs
      controllerName: agentgateway.dev/agentgateway
      parentRef:
        group: gateway.networking.k8s.io
        kind: Gateway
        name: virtual-model-errors
        namespace: default
        sectionName: llm
- apiVersion: agentgateway.dev/v1alpha1
  kind: AgentgatewayModel
  metadata:
    name: wildcard-model
    namespace: default
  spec: null
  status:
    parents:
    - conditions:
      - lastTransitionTime: fake
        message: Successfully accepted AgentgatewayModel
        reason: Accepted
        status: "True"
