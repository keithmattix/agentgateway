apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: mixed
  namespace: default
spec:
  gatewayClassName: agentgateway
  listeners:
  - name: http
    port: 80
    protocol: HTTP
    allowedRoutes:
      kinds:
      - group: agentgateway.dev
        kind: AgentgatewayModel
      - group: gateway.networking.k8s.io
        kind: HTTPRoute
      namespaces:
        from: Same
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayModel
metadata:
  name: gpt-5-mini
  namespace: default
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: mixed
    sectionName: http
  provider: OpenAI
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: health
  namespace: default
spec:
  parentRefs:
  - name: mixed
    sectionName: http
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /healthz
    backendRefs:
    - name: http-backend
      port: 8080
---
