apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: virtual-models
  namespace: default
spec:
  gatewayClassName: agentgateway
  listeners:
  - name: llm
    port: 80
    protocol: HTTP
    allowedRoutes:
      kinds:
      - group: agentgateway.dev
        kind: AgentgatewayModel
      namespaces:
        from: Same
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayModel
metadata:
  name: openai-models
  namespace: default
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: virtual-models
    sectionName: llm
  match:
    model: gpt-5-*
  visibility: Internal
  provider: OpenAI
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayModel
metadata:
  name: gpt-5-mini
  namespace: default
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: virtual-models
    sectionName: llm
  provider: OpenAI
  policies:
    transformations:
    - field: model
      expression: '"gpt-5-mini-transformed"'
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayModel
metadata:
  name: fast
  namespace: default
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: virtual-models
    sectionName: llm
  virtualModel:
    weighted:
      targets:
      - modelRef:
          name: gpt-5-mini
        weight: 90
      - modelRef:
          name: openai-models
        model: gpt-5-large
        weight: 10
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayModel
metadata:
  name: resilient
  namespace: default
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: virtual-models
    sectionName: llm
  virtualModel:
    failover:
      targets:
      - modelRef:
          name: gpt-5-mini
        priority: 0
      - modelRef:
          name: openai-models
        model: gpt-5-large
        priority: 1
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayModel
metadata:
  name: smart
  namespace: default
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: virtual-models
    sectionName: llm
  virtualModel:
    conditional:
      targets:
      - when: request.headers["x-tier"] == "premium"
        modelRef:
          name: openai-models
        model: gpt-5-large
      - modelRef:
          name: gpt-5-mini

---
