        backend:
          backend: default/openai-models/backend.llm
        modelVisibility: INTERNAL
      key: default/openai-models.llm
      listenerKey: default/virtual-models.llm
      match:
        model: gpt-5-*
- gateway:
    Name: virtual-models
    Namespace: default
  resource:
    modelRoute:
      key: default/resilient.llm
      listenerKey: default/virtual-models.llm
      match:
        model: resilient
      virtualModel:
        failover:
          backend:
            backend: default/resilient/failover.llm
- gateway:
    Name: virtual-models
    Namespace: default
  resource:
    modelRoute:
      key: default/smart.llm
      listenerKey: default/virtual-models.llm
      match:
        model: smart
      virtualModel:
        conditional:
          targets:
          - model: gpt-5-large
            when: request.headers["x-tier"] == "premium"
          - model: gpt-5-mini
