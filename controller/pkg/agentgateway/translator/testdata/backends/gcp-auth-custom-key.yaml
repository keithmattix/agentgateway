apiVersion: v1
kind: Secret
metadata:
  namespace: default
  name: gcp-creds
data:
  customCredentialsKey: eyJmb28iOiJiYXIifQ==
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  namespace: default
  name: static-backend
spec:
  static:
    host: example.com
    port: 8888
  policies:
    auth:
      gcp:
        secretRef:
          name: gcp-creds
          key: customCredentialsKey

---
