apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: delay
  namespace: default
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: dummy
  traffic:
    delay:
      duration: 2s
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: delay-conditional
  namespace: default
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: dummy
  traffic:
    delay:
      duration: "random() < 0.1 ? 500 : 0"

---
# Output
output:
- gateway:
    Name: dummy
    Namespace: default
  resource:
    policy:
      key: traffic/default/delay-conditional:delay:default/dummy
      name:
        kind: AgentgatewayPolicy
        name: delay-conditional
        namespace: default
      target:
        gateway:
          name: dummy
          namespace: default
      traffic:
        delay:
          duration: 'random() < 0.1 ? 500 : 0'
- gateway:
    Name: dummy
    Namespace: default
  resource:
    policy:
      key: traffic/default/delay:delay:default/dummy
      name:
        kind: AgentgatewayPolicy
        name: delay
        namespace: default
      target:
        gateway:
          name: dummy
          namespace: default
      traffic:
        delay:
          duration: duration("2s")
