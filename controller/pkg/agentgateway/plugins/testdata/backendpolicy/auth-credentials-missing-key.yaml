apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: auth-credentials-missing-key
  namespace: default
spec:
  targetRefs:
    - kind: HTTPRoute
      name: test
      group: gateway.networking.k8s.io
  backend:
    auth:
      credentials:
        - location:
            header:
              name: DD-API-KEY
          secretRef:
            name: datadog-partial
            key: DD-API-KEY
        - location:
            header:
              name: DD-APPLICATION-KEY
          secretRef:
            name: datadog-partial
            key: app-key
---
apiVersion: v1
kind: Secret
metadata:
  name: datadog-partial
  namespace: default
type: Opaque
data:
  # base64 of "primary-api-key"
  DD-API-KEY: cHJpbWFyeS1hcGkta2V5
  # app-key key intentionally missing
---
# Output
output:
- gateway:
    Name: test
    Namespace: default
  resource:
    policy:
      backend:
        auth:
          credentials:
          - location:
              header:
                name: DD-API-KEY
            value: primary-api-key
          - location:
              header:
                name: DD-APPLICATION-KEY
      key: backend/default/auth-credentials-missing-key:backend-auth:default/test
      name:
        kind: AgentgatewayPolicy
        name: auth-credentials-missing-key
        namespace: default
      target:
        route:
          kind: HTTPRoute
          name: test
          namespace: default
status:
- apiVersion: agentgateway.dev/v1alpha1
  kind: AgentgatewayPolicy
  metadata:
    name: auth-credentials-missing-key
    namespace: default
  spec: null
  status:
    ancestors:
    - ancestorRef:
        group: gateway.networking.k8s.io
        kind: Gateway
        name: test
        namespace: default
      conditions:
      - lastTransitionTime: fake
        message: 'backendAuth credential "DD-APPLICATION-KEY": secret default/datadog-partial
          missing key "app-key"'
        reason: PartiallyValid
        status: "True"
        type: Accepted
      controllerName: agentgateway.dev/agentgateway
