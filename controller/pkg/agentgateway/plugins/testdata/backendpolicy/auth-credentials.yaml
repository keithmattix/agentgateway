apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: auth-credentials
  namespace: default
spec:
  targetRefs:
    - kind: HTTPRoute
      name: test
      group: gateway.networking.k8s.io
  backend:
    auth:
      credentials:
        - location:
            header:
              name: DD-API-KEY
          secretRef:
            name: datadog
            key: DD-API-KEY
        - location:
            header:
              name: DD-APPLICATION-KEY
          secretRef:
            name: datadog
            key: app-key
        - location:
            header:
              name: X-Auth-Token
              prefix: "Bearer "
          secretRef:
            name: datadog
            key: token
---
apiVersion: v1
kind: Secret
metadata:
  name: datadog
  namespace: default
type: Opaque
data:
  # base64 of "primary-api-key"
  DD-API-KEY: cHJpbWFyeS1hcGkta2V5
  # base64 of "application-key"
  app-key: YXBwbGljYXRpb24ta2V5
  # base64 of "token-value"
  token: dG9rZW4tdmFsdWU=
---
# Output
output:
- gateway:
    Name: test
    Namespace: default
  resource:
    policy:
      backend:
        auth:
          credentials:
          - location:
              header:
                name: DD-API-KEY
            value: primary-api-key
          - location:
              header:
                name: DD-APPLICATION-KEY
            value: application-key
          - location:
              header:
                name: X-Auth-Token
                prefix: 'Bearer '
            value: token-value
      key: backend/default/auth-credentials:backend-auth:default/test
      name:
        kind: AgentgatewayPolicy
        name: auth-credentials
        namespace: default
      target:
        route:
          kind: HTTPRoute
          name: test
          namespace: default
status:
- apiVersion: agentgateway.dev/v1alpha1
  kind: AgentgatewayPolicy
  metadata:
    name: auth-credentials
    namespace: default
  spec: null
  status:
    ancestors:
    - ancestorRef:
        group: gateway.networking.k8s.io
        kind: Gateway
        name: test
        namespace: default
      conditions:
      - lastTransitionTime: fake
        message: Policy accepted
        reason: Valid
        status: "True"
        type: Accepted
      - lastTransitionTime: fake
        message: Attached to all targets
        reason: Attached
        status: "True"
        type: Attached
      controllerName: agentgateway.dev/agentgateway
