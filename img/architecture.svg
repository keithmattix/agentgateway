      <path d="m102.85 33.94-50.2 50.21c-9.37 9.37-9.37 24.56 0 33.94s24.57 9.37 33.94 0l50.2-50.21"/>
    </symbol>

    <style>
      :root{color-scheme:light dark}
      .canvas{fill:#0b0e18}
      .grid-line{fill:none;stroke:#fff;stroke-opacity:.025}
      .halo-core{stop-opacity:.34}
      .halo-edge{stop-opacity:.08}
      .eyebrow{fill:#8b90a3;font:600 11px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;letter-spacing:.12em}
      .eyebrow-strong{fill:#e6e8f2;font:700 13px Inter,ui-sans-serif,system-ui,sans-serif;letter-spacing:.16em}
      .trace{fill:none;stroke:#fff;stroke-opacity:.16;stroke-width:1.25}
      .trace-accent{fill:none;stroke:#8a3ffc;stroke-opacity:.72;stroke-width:1.5}
      .node{fill:#161b2b;stroke:#fff;stroke-opacity:.13}
      .icon-bg{fill:#fff;fill-opacity:.045;stroke:#fff;stroke-opacity:.11}
      .icon{fill:none;stroke:#e8eaf2;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
      .icon-fill,.brand{fill:#e8eaf2;stroke:none}
      .mcp{fill:none;stroke:#e8eaf2;stroke-width:14;stroke-linecap:round}
      .label{fill:#f5f6fa;font:500 14px Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;dominant-baseline:middle}
      .sub{fill:#9297aa;font:400 10px Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;dominant-baseline:middle}
      .pill{fill:#161b2b;stroke:#fff;stroke-opacity:.16}
      .pill-label{fill:#f5f6fa;font:500 13px Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;text-anchor:middle;dominant-baseline:middle}
      .leader{fill:none;stroke:#fff;stroke-opacity:.22;stroke-dasharray:2 4}
      .pin{fill:#fff;fill-opacity:.18}
      .arrow{fill:#8b90a3}
      @media (prefers-color-scheme:light){
        .canvas{fill:#fbfbfe}
        .grid-line{stroke:#0f1323;stroke-opacity:.035}
        .halo-core{stop-opacity:.20}
        .halo-edge{stop-opacity:.045}
        .eyebrow{fill:#73798d}
        .eyebrow-strong{fill:#2a2f45}
        .trace{stroke:#0f1323;stroke-opacity:.18}
        .node{fill:#fff;stroke:#dee0ee;stroke-opacity:1}
        .icon-bg{fill:#f6f7fb;fill-opacity:1;stroke:#dee0ee;stroke-opacity:1}
        .icon{stroke:#252a3d}
        .icon-fill,.brand{fill:#252a3d}
        .mcp{stroke:#252a3d}
        .label,.pill-label{fill:#151927}
        .sub{fill:#73798d}
        .pill{fill:#fff;stroke:#dee0ee;stroke-opacity:1}
        .leader{stroke:#b0b4c8;stroke-opacity:1}
        .pin{fill:#0f1323;fill-opacity:.18}
        .arrow{fill:#73798d}
      }
    </style>
  </defs>

  <rect width="1280" height="720" rx="24" class="canvas"/>
  <rect width="1280" height="720" rx="24" fill="url(#grid)"/>
  <circle cx="640" cy="360" r="300" fill="url(#halo)"/>

  <!-- Headings -->
  <path d="M610 100h60" class="trace"/>
  <text x="640" y="120" class="eyebrow" text-anchor="middle">AGENTGATEWAY · CONTROL PLANE</text>

  <!-- Request and response traces -->
  <path d="M304 256h116q12 0 12 12v42q0 12 12 12h116M304 360h256M304 464h116q12 0 12-12v-42q0-12 12-12h116" class="trace"/>
  <path d="M304 256h116q12 0 12 12v42q0 12 12 12h116M304 360h256M304 464h116q12 0 12-12v-42q0-12 12-12h116" class="trace-accent" stroke-dasharray="5 18"/>
  <path d="M720 288h110q12 0 12-12v-88q0-12 12-12h122M720 324h140q12 0 12-12v-28q0-12 12-12h92M720 360h256M720 396h140q12 0 12 12v28q0 12 12 12h92M720 432h110q12 0 12 12v88q0 12 12 12h122" class="trace"/>
  <path d="M720 288h110q12 0 12-12v-88q0-12 12-12h122M720 324h140q12 0 12-12v-28q0-12 12-12h92M720 360h256M720 396h140q12 0 12 12v28q0 12 12 12h92M720 432h110q12 0 12 12v88q0 12 12 12h122" class="trace-accent" stroke-dasharray="5 24"/>

  <!-- Source nodes -->
  <g transform="translate(64 224)">
    <rect width="240" height="64" rx="14" class="node"/>
    <rect x="14" y="14" width="36" height="36" rx="10" class="icon-bg"/>
    <use href="#terminal" x="20" y="20" width="24" height="24" class="icon"/>
    <text x="64" y="26" class="label">CLI / IDE</text>
    <text x="64" y="44" class="sub">Claude, Codex, OpenCode</text>
  </g>
  <g transform="translate(64 328)">
    <rect width="240" height="64" rx="14" class="node"/>
    <rect x="14" y="14" width="36" height="36" rx="10" class="icon-bg"/>
    <use href="#agent" x="20" y="20" width="24" height="24" class="icon"/>
    <text x="64" y="26" class="label">AI agents</text>
    <text x="64" y="44" class="sub">LangSmith, CrewAI, ADK</text>
  </g>
  <g transform="translate(64 432)">
    <rect width="240" height="64" rx="14" class="node"/>
    <rect x="14" y="14" width="36" height="36" rx="10" class="icon-bg"/>
    <use href="#person" x="20" y="20" width="24" height="24" class="icon"/>
    <text x="64" y="32" class="label">Apps &amp; clients</text>
  </g>

