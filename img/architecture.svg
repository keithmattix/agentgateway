    </symbol>
    <symbol id="anthropic" viewBox="0 0 24 24">
      <path d="M13.827 3.52h3.603L24 20h-3.603l-6.57-16.48zm-7.258 0h3.767L16.906 20h-3.674l-1.343-3.461H5.017l-1.344 3.46H0L6.57 3.522zm4.132 9.959L8.453 7.687 6.205 13.48H10.7z"/>
    </symbol>
    <symbol id="mcp" viewBox="0 0 180 180">
      <path d="M18 84.85 85.88 16.97c9.37-9.37 24.57-9.37 33.94 0s9.38 24.57 0 33.94l-51.26 51.27"/>
