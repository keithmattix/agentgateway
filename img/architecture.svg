  <g transform="translate(976 148)">
    <rect width="240" height="56" rx="14" class="node"/>
    <rect x="12" y="12" width="32" height="32" rx="9" class="icon-bg"/>
    <use href="#agent" x="16" y="16" width="24" height="24" class="icon"/>
    <text x="56" y="28" class="label">AI agents</text>
  </g>
  <g transform="translate(976 244)">
    <rect width="240" height="56" rx="14" class="node"/>
    <rect x="12" y="12" width="32" height="32" rx="9" class="icon-bg"/>
    <use href="#openai" x="16" y="16" width="24" height="24" class="brand"/>
    <text x="56" y="28" class="label">OpenAI</text>
  </g>
  <g transform="translate(976 332)">
    <rect width="240" height="56" rx="14" class="node"/>
    <rect x="12" y="12" width="32" height="32" rx="9" class="icon-bg"/>
    <use href="#anthropic" x="16" y="16" width="24" height="24" class="brand"/>
    <text x="56" y="28" class="label">Anthropic</text>
  </g>
  <g transform="translate(976 420)">
    <rect width="240" height="56" rx="14" class="node"/>
    <rect x="12" y="12" width="32" height="32" rx="9" class="icon-bg"/>
    <use href="#mcp" x="16" y="16" width="24" height="24" class="mcp"/>
    <text x="56" y="28" class="label">MCP / A2A</text>
  </g>
  <g transform="translate(976 516)">
    <rect width="240" height="56" rx="14" class="node"/>
    <rect x="12" y="12" width="32" height="32" rx="9" class="icon-bg"/>
    <use href="#api" x="16" y="16" width="24" height="24" class="icon"/>
    <text x="56" y="28" class="label">APIs / Services</text>
  </g>

