<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">agentgateway architecture</title>
  <desc id="desc">Requests from command-line tools, AI agents, and applications flow through agentgateway to AI agents, model providers, MCP and A2A servers, and APIs.</desc>

  <defs>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#8a3ffc" class="halo-core"/>
      <stop offset=".62" stop-color="#8a3ffc" class="halo-edge"/>
      <stop offset="1" stop-color="#8a3ffc" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" class="grid-line"/>
    </pattern>

    <symbol id="terminal" viewBox="0 0 24 24">
      <path d="M2 4h20v16H2zM6 9l3 3-3 3m6 0h6"/>
    </symbol>
    <symbol id="agent" viewBox="0 0 24 24">
      <path d="M3 10a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4v6a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4zm9-8v4M3 14H2m20 0h-1"/>
      <circle cx="9" cy="13" r="1.2" class="icon-fill"/>
      <circle cx="15" cy="13" r="1.2" class="icon-fill"/>
    </symbol>
    <symbol id="person" viewBox="0 0 24 24">
      <circle cx="12" cy="8" r="3.5"/>
      <path d="M5 20a7 7 0 0 1 14 0"/>
    </symbol>
    <symbol id="api" viewBox="0 0 24 24">
      <path d="M9 6 3 12l6 6m6-12 6 6-6 6m-1-14-4 16"/>
    </symbol>
    <symbol id="openai" viewBox="0 0 24 24">
